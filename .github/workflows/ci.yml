# CI Workflow — GitHub Actions
#
# This workflow runs automatically whenever code is pushed to `main`
# or a pull request is opened against `main`
# or manually

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Set up Node.js ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # ── Step 3: Install dependencies ────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Step 4: Lint ────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── Step 5: Test ────────────────────────────────────────────────────
      - name: Test
        run: npm test

      # ── Step 6: Build ───────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── Step 7: Docker Build ───────────────────────────────────────────
      - name: Build Docker image
        run: docker build -t typescript-api .
